services:
  app:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev --hostname 0.0.0.0 --port 3005"
    ports:
      - "3005:3005"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_dev:/app/.next-dev
      - bun_cache:/root/.bun
    environment:
      NODE_ENV: development
      PORT: "3005"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"

volumes:
  node_modules:
  next_dev:
  bun_cache:
