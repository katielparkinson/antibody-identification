services:
  web:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bun-cache:/root/.bun
      - next-cache:/app/.next
    environment:
      NODE_ENV: development

volumes:
  bun-cache:
  next-cache:
