name: Deploy antibodyidentification

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build_image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build_image.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        id: build_image
        run: |
          set -euo pipefail

          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "This workflow only publishes tagged images (refs/tags/*)."
            exit 1
          fi
          IMAGE_TAG="${GITHUB_REF_NAME}"

          IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"
          docker build --pull --file Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

          docker tag "$IMAGE" "${IMAGE_REPO}:latest"
          docker push "${IMAGE_REPO}:latest"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write SSH key
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZ_VPS1_DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Trust deploy host
        run: |
          set -euo pipefail
          ssh-keyscan -H "${{ vars.HETZ_VPS1_DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy compose file
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=yes \
            compose.prod.yml \
            "${{ vars.HETZ_VPS1_DEPLOY_USER }}@${{ vars.HETZ_VPS1_DEPLOY_HOST }}:/opt/antibody-identification/compose.prod.yml"

      - name: Deploy with SSH
        run: |
          set -euo pipefail

          TARGET_DIR="/opt/antibody-identification"
          COMPOSE_FILE="compose.prod.yml"
          ANTIBODY_IDENTIFICATION_IMAGE="${{ needs.build_image.outputs.image }}"
          DOMAIN="${{ vars.DOMAIN }}"
          PORT="3005"
          SSH_HOST="${{ vars.HETZ_VPS1_DEPLOY_HOST }}"
          SSH_USER="${{ vars.HETZ_VPS1_DEPLOY_USER }}"

          if [ -z "$ANTIBODY_IDENTIFICATION_IMAGE" ]; then
            echo "Missing required image name"
            exit 1
          fi

          if [ -z "$DOMAIN" ]; then
            echo "Missing required domain"
            echo "Expected vars.DOMAIN"
            exit 1
          fi

          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail
             mkdir -p '$TARGET_DIR'
             cd '$TARGET_DIR'
             printf 'ANTIBODY_IDENTIFICATION_IMAGE=%s\nDOMAIN=%s\nPORT=%s\n' \
               '$ANTIBODY_IDENTIFICATION_IMAGE' '$DOMAIN' '$PORT' > .env
             chmod 600 .env
             printf '%s\n' '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
             docker compose --env-file .env -f '$COMPOSE_FILE' up -d --pull always --remove-orphans"
