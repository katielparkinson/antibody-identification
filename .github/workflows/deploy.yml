name: Deploy antibodyidentification

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build_image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build_image.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        id: build_image
        run: |
          set -euo pipefail

          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "This workflow only publishes tagged images (refs/tags/*)."
            exit 1
          fi
          IMAGE_TAG="${GITHUB_REF_NAME}"

          IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"
          docker build --pull --file Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

          docker tag "$IMAGE" "${IMAGE_REPO}:latest"
          docker push "${IMAGE_REPO}:latest"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy via shared SSH action
        uses: mckaymoore/github-actions/.github/actions/ssh@master
        with:
          enable_sync: true
          source_dir: .
          destination_dir: /opt/antibody-identification
          strict_host_key_checking: true
          ssh_host: ${{ vars.HETZ_VPS1_DEPLOY_HOST }}
          ssh_user: ${{ vars.HETZ_VPS1_DEPLOY_USER }}
          ssh_port: "22"
          sync_exclude: |
            .git/
            .next/
            .next-dev/
            node_modules/
            playwright-report/
            test-results/
          sync_include: |
            compose.prod.yml
          command: |
            set -euo pipefail

            TARGET_DIR="/opt/antibody-identification"
            COMPOSE_FILE="compose.prod.yml"
            ANTIBODY_IDENTIFICATION_IMAGE="${{ needs.build_image.outputs.image }}"
            ANTIBODY_IDENTIFICATION_DOMAIN="${{ vars.DOMAIN }}"
            ANTIBODY_IDENTIFICATION_PORT="3005"
            GHCR_USERNAME="${{ github.actor }}"
            GHCR_TOKEN="${{ github.token }}"

            if [ -z "$ANTIBODY_IDENTIFICATION_IMAGE" ]; then
              echo "Missing required image name"
              exit 1
            fi

            if [ -z "$ANTIBODY_IDENTIFICATION_DOMAIN" ]; then
              echo "Missing required domain"
              echo "Expected vars.DOMAIN"
              exit 1
            fi

            if [ -z "$ANTIBODY_IDENTIFICATION_PORT" ]; then
              echo "Missing required app port"
              echo "Expected vars.PORT"
              exit 1
            fi

            if ! [[ "$ANTIBODY_IDENTIFICATION_PORT" =~ ^[0-9]+$ ]]; then
              echo "Invalid app port: must be numeric"
              echo "Got: $ANTIBODY_IDENTIFICATION_PORT"
              exit 1
            fi

            if [ "$ANTIBODY_IDENTIFICATION_PORT" -lt 1 ] || [ "$ANTIBODY_IDENTIFICATION_PORT" -gt 65535 ]; then
              echo "Invalid app port: out of range"
              echo "Expected 1-65535, got: $ANTIBODY_IDENTIFICATION_PORT"
              exit 1
            fi

            mkdir -p "$TARGET_DIR"
            printf "ANTIBODY_IDENTIFICATION_IMAGE=%s\nANTIBODY_IDENTIFICATION_DOMAIN=%s\nANTIBODY_IDENTIFICATION_PORT=%s\n" \
              "$ANTIBODY_IDENTIFICATION_IMAGE" "$ANTIBODY_IDENTIFICATION_DOMAIN" "$ANTIBODY_IDENTIFICATION_PORT" > "$TARGET_DIR/.env"

            chmod 600 "$TARGET_DIR/.env"

            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            if [ ! -f "$TARGET_DIR/$COMPOSE_FILE" ]; then
              echo "Missing compose file: $COMPOSE_FILE"
              exit 1
            fi

            cd "$TARGET_DIR"
            docker compose --env-file .env -f "$COMPOSE_FILE" up -d --pull always --remove-orphans
          ssh_private_key: ${{ secrets.HETZ_VPS1_DEPLOY_SSH_KEY }}
